# Netlify Configuration — Game People Benevento

[build]
  publish = "."

# Redirect www → apex (canonical)
[[redirects]]
  from = "https://www.gamepeoplebenevento.netlify.app/*"
  to   = "https://gamepeoplebenevento.netlify.app/:splat"
  status = 301
  force  = true

# Security & performance headers per tutte le pagine
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"

# Cache aggressivo per asset statici (1 anno)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# robots.txt e sitemap: nessuna cache aggressiva
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
